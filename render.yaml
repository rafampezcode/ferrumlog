services:
  - type: web
    name: ferrumlog-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: starter
    autoDeployTrigger: commit
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: ferrumlog-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: ferrumlog-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: ferrumlog-db
          property: password
      - key: JAVA_OPTS
        value: -Xms256m -Xmx512m

databases:
  - name: ferrumlog-db
    region: frankfurt
    databaseName: ferrumlog_db
    user: ferrumlog
    ipAllowList: []