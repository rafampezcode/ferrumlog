# ===================================
# PERFIL DE PRODUCCIÓN - POSTGRESQL
# ===================================
# Activar con: spring.profiles.active=postgresql
# O mediante variable de entorno: SPRING_PROFILES_ACTIVE=postgresql

# ===== BASE DE DATOS PostgreSQL =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ferrumlog_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:password}}

# ===== HIBERNATE DDL =====
# validate: Solo valida el esquema (NO lo modifica)
# update: Actualiza el esquema automáticamente (CUIDADO en producción)
# Para producción real, usa Flyway o Liquibase para migraciones controladas
spring.jpa.hibernate.ddl-auto=update

# Dialecto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===== POOL DE CONEXIONES (HikariCP) =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== CONFIGURACIÓN POSTGRESQL ESPECÍFICA =====
# Mejora el rendimiento en PostgreSQL
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===== LOGGING ESPECÍFICO =====
logging.level.com.ferrumlog=INFO
logging.level.org.hibernate.SQL=INFO

# ===== NOTAS DE CONFIGURACIÓN =====
# 1. Crear la base de datos antes de ejecutar:
#    CREATE DATABASE ferrumlog_db
#        WITH OWNER = postgres
#        ENCODING = 'UTF8'
#        LC_COLLATE = 'es_ES.UTF-8'
#        LC_CTYPE = 'es_ES.UTF-8'
#        TEMPLATE = template0;
#
# 2. Configurar usuario con permisos (opcional, más seguro):
#    CREATE USER ferrumlog WITH PASSWORD 'tu_password_seguro';
#    GRANT ALL PRIVILEGES ON DATABASE ferrumlog_db TO ferrumlog;
#
# 3. Usar variables de entorno para credenciales sensibles:
#    export DB_USERNAME=ferrumlog
#    export DB_PASSWORD=tu_password_seguro
#
# 4. En producción, considera usar SSL:
#    spring.datasource.url=jdbc:postgresql://localhost:5432/ferrumlog_db?ssl=true&sslmode=require
