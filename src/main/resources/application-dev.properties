# ===================================
# PERFIL DE DESARROLLO - H2 EN MEMORIA
# ===================================
# Activar con: spring.profiles.active=dev
# O mediante variable de entorno: SPRING_PROFILES_ACTIVE=dev

# ===== BASE DE DATOS H2 (Persistente en archivo local) =====
spring.datasource.url=jdbc:h2:file:${user.home}/.ferrumlog/ferrumlog_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 para inspeccionar la BD
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== HIBERNATE DDL =====
# update: conserva los datos y actualiza esquema cuando haga falta
spring.jpa.hibernate.ddl-auto=update

# Dialecto específico para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===== LOGGING ESPECÍFICO =====
logging.level.com.ferrumlog=DEBUG
