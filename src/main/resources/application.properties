# ===================================
# FERRUMLOG - CONFIGURACIÓN BASE
# ===================================

# ===== INFORMACIÓN DE LA APLICACIÓN =====
spring.application.name=FerrumLog

# ===== PERFIL ACTIVO =====
# Cambiar según el entorno:
# - dev: H2 en memoria (desarrollo rápido)
# - mysql: MySQL (producción o desarrollo local)
# - postgresql: PostgreSQL (producción recomendada)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===== JPA / HIBERNATE (Configuración global) =====
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== LOGGING =====
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.ferrumlog=INFO

# ===== SERVIDOR =====
server.port=${PORT:3000}
server.forward-headers-strategy=framework
server.error.include-message=always
server.error.include-binding-errors=always

# ===== THYMELEAF (Motor de plantillas) =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===== SEGURIDAD =====
# Los logs de seguridad pueden ser útiles para debugging
logging.level.org.springframework.security=INFO

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

