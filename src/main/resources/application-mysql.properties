# ===================================
# PERFIL DE PRODUCCIÓN - MYSQL
# ===================================
# Activar con: spring.profiles.active=mysql
# O mediante variable de entorno: SPRING_PROFILES_ACTIVE=mysql

# ===== BASE DE DATOS MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/ferrumlog_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# ===== HIBERNATE DDL =====
# validate: Solo valida el esquema (NO lo modifica)
# update: Actualiza el esquema automáticamente (CUIDADO en producción)
# Para producción real, usa Flyway o Liquibase para migraciones controladas
spring.jpa.hibernate.ddl-auto=update

# Dialecto específico para MySQL 8+
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== POOL DE CONEXIONES (HikariCP) =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== LOGGING ESPECÍFICO =====
logging.level.com.ferrumlog=INFO
logging.level.org.hibernate.SQL=INFO

# ===== NOTAS DE CONFIGURACIÓN =====
# 1. Crear la base de datos antes de ejecutar:
#    CREATE DATABASE ferrumlog_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#
# 2. Configurar usuario con permisos:
#    CREATE USER 'ferrumlog'@'localhost' IDENTIFIED BY 'tu_password_seguro';
#    GRANT ALL PRIVILEGES ON ferrumlog_db.* TO 'ferrumlog'@'localhost';
#    FLUSH PRIVILEGES;
#
# 3. Usar variables de entorno para credenciales sensibles:
#    export DB_USERNAME=ferrumlog
#    export DB_PASSWORD=tu_password_seguro
