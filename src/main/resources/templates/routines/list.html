<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Rutinas - FerrumLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --gym-orange: #ff6b35;
            --gym-dark: #1a1a2e;
            --gym-darker: #0f0f1e;
        }

        body {
            font-family: 'Inter', 'Roboto', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--gym-darker) 0%, var(--gym-dark) 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .navbar {
            background-color: rgba(26, 26, 46, 0.95);
            border-bottom: 2px solid rgba(255, 107, 53, 0.3);
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--gym-orange) !important;
        }

        .card-custom {
            background: rgba(26, 26, 46, 0.85);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gym-orange) 0%, #ff8c5a 100%);
            border: none;
            font-weight: 700;
        }

        .btn-outline-light {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .text-muted-light {
            color: rgba(255, 255, 255, 0.65);
        }
    </style>
    <link href="/css/light-commercial-theme.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <img src="/images/logo.jpg" alt="FerrumLog" class="brand-logo">
            <span class="brand-wordmark">FERRUMLOG</span>
        </a>
        <div class="ms-auto d-flex gap-3 align-items-center">
            <a class="nav-link text-light" href="/dashboard">Dashboard</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="nav-link btn btn-link p-0 border-0 bg-transparent text-light">Cerrar Sesion</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Mis Rutinas</h1>
            <p class="text-muted-light mb-0">Aqui solo se muestran las rutinas del usuario autenticado.</p>
        </div>
        <a href="/routines/new" class="btn btn-primary">+ Nueva Rutina</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(routines)}" class="card-custom">
        <h5 class="mb-2">No tienes rutinas aun</h5>
        <p class="text-muted-light mb-0">Crea tu primera rutina para empezar a organizar tus entrenamientos.</p>
    </div>

    <div th:each="routine : ${routines}" class="card-custom">
        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
            <div>
                <h5 class="mb-2" th:text="${routine.name}">Nombre rutina</h5>
                <p class="text-muted-light mb-0" th:text="${routine.description != null and !#strings.isEmpty(routine.description) ? routine.description : 'Sin descripcion'}">Descripcion</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/routines/{id}/edit(id=${routine.id})}" class="btn btn-sm btn-outline-light">Editar</a>
                <form th:action="@{/routines/{id}/delete(id=${routine.id})}" method="post">
                    <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
