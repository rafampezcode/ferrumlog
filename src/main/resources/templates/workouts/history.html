<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Entrenamientos - FerrumLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/light-commercial-theme.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <img src="/images/logo.jpg" alt="FerrumLog" class="brand-logo">
            <span class="brand-wordmark">FERRUMLOG</span>
        </a>
        <div class="ms-auto d-flex gap-3 align-items-center">
            <a class="nav-link" href="/dashboard">Dashboard</a>
            <a class="nav-link" href="/workouts/record">Nuevo entreno</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="nav-link btn btn-link p-0 border-0 bg-transparent">Cerrar Sesion</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
                <h1 class="h3 mb-0">Historial de Entrenamientos</h1>
                <form method="get" action="/workouts/history" class="d-flex align-items-center gap-2">
                    <label for="sort" class="form-label mb-0">Orden:</label>
                    <select id="sort" name="sort" class="form-select" onchange="this.form.submit()">
                        <option value="desc" th:selected="${sort == 'desc'}">Mas recientes primero</option>
                        <option value="asc" th:selected="${sort == 'asc'}">Mas antiguos primero</option>
                    </select>
                </form>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Series</th>
                        <th>Ejercicios</th>
                        <th>Accion</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(workouts)}">
                        <td colspan="4">Todavia no has registrado entrenamientos.</td>
                    </tr>
                    <tr th:each="workout : ${workouts}">
                        <td th:text="${#temporals.format(workout.workoutDate, 'dd/MM/yyyy HH:mm')}">01/01/2026 18:30</td>
                        <td th:text="${workout.totalSets}">0</td>
                        <td th:text="${workout.totalExercises}">0</td>
                        <td><a th:href="@{|/workouts/${workout.id}|}" class="btn btn-sm btn-primary">Ver entreno</a></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
