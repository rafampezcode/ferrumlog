<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Entrenamiento - FerrumLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/light-commercial-theme.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <img src="/images/logo.jpg" alt="FerrumLog" class="brand-logo">
            <span class="brand-wordmark">FERRUMLOG</span>
        </a>
        <div class="ms-auto d-flex gap-3 align-items-center">
            <a class="nav-link" href="/dashboard">Dashboard</a>
            <a class="nav-link" href="/workouts/history">Historial</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="nav-link btn btn-link p-0 border-0 bg-transparent">Cerrar Sesion</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="card mb-3">
        <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <h1 class="h3 mb-1">Detalle del entreno</h1>
                <p class="mb-0 text-muted"
                   th:text="${workout != null ? #temporals.format(workout.workoutDate, 'dd/MM/yyyy HH:mm') : 'Entreno'}">01/01/2026 18:30</p>
            </div>
            <div class="d-flex gap-2">
                <a href="/workouts/history" class="btn btn-outline-secondary">Volver al historial</a>
                <a href="/workouts/record" class="btn btn-primary">Nuevo entreno</a>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Ejercicio</th>
                        <th>Peso (kg)</th>
                        <th>Reps</th>
                        <th>RPE</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(workoutSets)}">
                        <td colspan="4">No hay series en este entreno.</td>
                    </tr>
                    <tr th:each="set : ${workoutSets}">
                        <td th:text="${set.exerciseName}">Sentadilla</td>
                        <td th:text="${set.weight}">100</td>
                        <td th:text="${set.reps}">8</td>
                        <td th:text="${set.rpe != null ? set.rpe : '-'}">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
